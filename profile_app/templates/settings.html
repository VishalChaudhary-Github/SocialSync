{% extends 'landing.html' %}

{% block title %}Settings{% endblock %}

{% block feed_change %}
<div class="container">

    <div class="row" style="display: flex; justify-content: center">

        <div class="col-sm-6 text-center">
            <h3 style="color: #7f968d; padding-bottom: 15px">Profile Setting</h3>

            <form method="POST" action="{% url 'profile_app-update-profile' %}" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="input-group mb-3">
                    <input type="file" class="form-control" id="inputGroupFile02" name="profile_photo">
                    <label class="input-group-text" for="inputGroupFile02">Profile Photo</label>
                </div>
                <div class="mb-3">
                    <input class="form-control" placeholder="Tell us About Yourself" name="description" required>
                </div>
                <div class="mb-3">
                    <select class="form-select form-select-sm" aria-label="Small select example" name="gender" required>
                        <option selected>Select Gender</option>
                        <option value="M">Male</option>
                        <option value="F">Female</option>
                        <option value="O">Others</option>
                    </select>
                </div>
                <div class="mb-3">
                    <input type="text" class="form-control" name="first_name" placeholder="{{ first_name }}" disabled>
                </div>
                <div class="mb-3">
                    <input type="text" class="form-control" name="last_name" placeholder="{{ last_name }}" disabled>
                </div>
                <div class="mb-3">
                    <input type="text" class="form-control" placeholder="{{ username }}" disabled>
                </div>
                <div class="mb-3">
                    <input type="email" class="form-control" name="email" placeholder="{{ email }}" disabled>
                </div>
                <div class="mb-3">
                    <input type="date" class="form-control" name="dob" required>
                </div>
                <button type="submit" class="btn btn-outline-info">Update</button>
            </form>
            <!-- Button trigger modal -->
            <button type="button" class="btn btn-outline-info" style="margin-top: 15px" data-bs-toggle="modal" data-bs-target="#exampleModal" data-bs-whatever="@mdo">Change Password</button>

            <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
              <div class="modal-dialog">
                <div class="modal-content">
                  <div class="modal-header">
                    <h5 class="modal-title" id="exampleModalLabel">New Password</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                  </div>
                  <div class="modal-body">
                    <form method="POST" action="{% url 'profile_app-set-password' %}">
                        {% csrf_token %}
                        <div class="mb-3">
                            <input type="password" class="form-control" id="recipient-name" placeholder="Enter new password" name="new_password" required>
                        </div>
                        <button type="submit" class="btn btn-outline-info">Save</button>
                    </form>
                  </div>
                </div>
              </div>
            </div>
        </div>
    </div>

</div>
{% endblock %}
